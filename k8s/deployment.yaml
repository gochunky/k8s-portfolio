apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-frontend
  namespace: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: portfolio
  template:
    metadata:
      labels:
        app: portfolio
    spec:
      containers:
      - name: web-app
        image: ghcr.io/your-username/k8s-portfolio:latest
        ports:
        - containerPort: 80